name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  tinygo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate installer syntax
        run: bash -n scripts/install_toolchain.sh

      - name: Install TinyGo toolchain
        env:
          GO_VERSION: "1.22.4"
          TINYGO_VERSION: "0.40.1"
        run: bash scripts/install_toolchain.sh

      - name: Update PATH for Go and TinyGo
        run: |
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          echo "/usr/local/tinygo/bin" >> "$GITHUB_PATH"

      - name: Verify tool versions
        run: |
          go version
          tinygo version

      - name: Build TinyGo examples
        run: |
          set -euo pipefail
          examples=(
            examples/buzzer
            examples/demo
            examples/obstacle_avoidance
            examples/remote
            examples/trim
          )
          for dir in "${examples[@]}"; do
            tinygo build -target nicenano -o "/tmp/$(basename "$dir").uf2" "$dir"
          done
